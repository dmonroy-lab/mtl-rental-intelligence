function Badge({label,color}){return <span style={{fontSize:"10px",padding:"2px 9px",borderRadius:"10px",fontWeight:"700",background:`${color}18`,color,border:`1px solid ${color}33`,whiteSpace:"nowrap"}}>{label}</span>;}

function TopPosts({comp,t}){
  const [ap,sAp]=useState(Object.keys(comp.platforms)[0]);
  const [sort,sSort]=useState("likes");
  const pd=comp.platforms[ap];
  const posts=pd&&pd.top_posts?[...pd.top_posts].sort((a,b)=>sort==="engagement"?(b.likes/(pd.followers||1))-(a.likes/(pd.followers||1)):(b[sort]||0)-(a[sort]||0)):[];
  return <div style={{marginTop:"16px"}}>
    <div style={{fontSize:"11px",fontWeight:"700",color:"#888",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"10px"}}>{t.topPosts}</div>
    <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"8px"}}>
      {Object.keys(comp.platforms).map(p=><button key={p} onClick={()=>sAp(p)} style={{padding:"4px 10px",borderRadius:"20px",border:"none",cursor:"pointer",fontSize:"10px",fontWeight:"600",background:ap===p?`${pColors[p]}22`:"#111",color:ap===p?pColors[p]:"#555",outline:ap===p?`1px solid ${pColors[p]}44`:"none"}}>{pIcons[p]} {p.charAt(0).toUpperCase()+p.slice(1)}</button>)}
    </div>
    <div style={{display:"flex",gap:"4px",flexWrap:"wrap",marginBottom:"10px"}}>
      {[["likes",t.byLikes],["views",t.byViews],["comments",t.byComments],["engagement",t.byEngagement]].map(([id,label])=><button key={id} onClick={()=>sSort(id)} style={{padding:"3px 9px",borderRadius:"7px",border:"none",cursor:"pointer",fontSize:"10px",fontWeight:"600",background:sort===id?"#7C3AED":"#1a1a1a",color:sort===id?"#fff":"#555"}}>{label}</button>)}
    </div>
    {posts.length>0?posts.map((p,i)=>{
      const eRate=pd.followers?((p.likes/pd.followers)*100).toFixed(2):"—";
      return <div key={i} style={{background:"#111",borderRadius:"8px",padding:"10px 12px",marginBottom:"7px",border:"1px solid #1a1a1a",display:"grid",gridTemplateColumns:"22px 1fr auto",gap:"8px",alignItems:"center"}}>
        <div style={{fontSize:"12px",fontWeight:"800",color:i===0?comp.color:"#333"}}>#{i+1}</div>
        <div>
          <div style={{fontSize:"11px",color:"#ddd",marginBottom:"5px",lineHeight:"1.4"}}>{p.desc}</div>
          <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
            <span style={{fontSize:"10px",color:"#E1306C"}}>❤️ {fmt(p.likes)}</span>
            {p.views&&<span style={{fontSize:"10px",color:"#777"}}>👁️ {fmt(p.views)}</span>}
            <span style={{fontSize:"10px",color:"#777"}}>💬 {fmt(p.comments)}</span>
            <span style={{fontSize:"10px",color:Number(eRate)>2?"#10B981":Number(eRate)>0.5?"#F59E0B":"#EF4444"}}>⚡ {eRate}%</span>
            <span style={{fontSize:"9px",background:"#222",color:"#555",padding:"1px 5px",borderRadius:"3px"}}>{p.type}</span>
          </div>
        </div>
        <a href={p.url} target="_blank" rel="noopener noreferrer" style={{fontSize:"10px",padding:"4px 8px",borderRadius:"6px",textDecoration:"none",background:`${pColors[ap]}18`,color:pColors[ap],fontWeight:"600",whiteSpace:"nowrap"}}>{t.openPost}</a>
      </div>;
    }):<div style={{padding:"10px",background:"#111",borderRadius:"8px",fontSize:"11px",color:"#444",textAlign:"center"}}>{t.noData}</div>}
  </div>;
}

    <div style={{marginBottom:"18px",display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:"10px"}}>
      <div>
        <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"3px",flexWrap:"wrap"}}>
          <div style={{fontSize:"20px",fontWeight:"900",color:"#fff",letterSpacing:"-0.5px"}}>🏙️ {t.title}</div>
          <span style={{fontSize:"9px",padding:"2px 8px",borderRadius:"8px",background:"#7C3AED22",color:"#a78bfa",border:"1px solid #7C3AED44",fontWeight:"700"}}>LIVE TRACKER</span>
        </div>
        <div style={{fontSize:"10px",color:"#333"}}>{t.subtitle} · {COMPETITORS.length} companies · {t.updated}</div>
      </div>
      <div style={{display:"flex",gap:"3px",background:"#111",padding:"3px",borderRadius:"8px"}}>
        {[["en","EN"],["fr","FR"],["es","ES"]].map(([code,label])=><button key={code} onClick={()=>sLang(code)} style={{padding:"4px 10px",borderRadius:"6px",border:"none",cursor:"pointer",fontSize:"10px",fontWeight:"700",background:lang===code?"#7C3AED":"transparent",color:lang===code?"#fff":"#555"}}>{label}</button>)}
      </div>
    </div>
    <div style={{display:"flex",gap:"2px",padding:"3px",background:"#111",borderRadius:"10px",marginBottom:"16px",flexWrap:"wrap"}}>
      {tabs.map(tb=><button key={tb.id} onClick={()=>sTab(tb.id)} style={{padding:"6px 11px",borderRadius:"8px",border:"none",cursor:"pointer",background:tab===tb.id?tb.color:"transparent",color:tab===tb.id?"#fff":"#666",fontWeight:tab===tb.id?"700":"400",fontSize:"11px",transition:"all 0.15s",whiteSpace:"nowrap"}}>{tb.icon} {tb.label}</button>)}
    </div>
    {tab==="overview"&&<OverviewTab t={t} onSel={handleSel}/>}
    {tab==="competitors"&&<CompetitorsTab t={t} selId={selId} setSel={sSelId}/>}
    {tab==="platforms"&&<PlatformTab t={t}/>}
    {tab==="weekly"&&<WeeklyTab t={t}/>}
    {tab==="creation"&&<CreationTab t={t}/>}
    {tab==="mystats"&&<MyStatsTab t={t}/>}
    <div style={{marginTop:"24px",padding:"10px 14px",background:"#111",borderRadius:"8px",fontSize:"9px",color:"#222",textAlign:"center"}}>
      MTL Rental Intelligence · Padly · Update data every Monday · <span style={{color:"#7C3AED"}}>Data based on manual research — verify platforms weekly</span>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
