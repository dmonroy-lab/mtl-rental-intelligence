name: 🔄 Auto-Update Padly Dashboard

on:
  schedule:
    # Runs Monday, Wednesday, Friday at 8:00 AM Montreal time (UTC-4 in summer = 12:00 UTC)
    - cron: '0 12 * * 1,3,5'
  workflow_dispatch: # Also allows manual trigger from GitHub UI

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install anthropic requests

      - name: 🤖 Generate updated dashboard
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: 📤 Commit and push updated dashboard
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Padly Bot 🤖"
          git add index.html
          git diff --staged --quiet || git commit -m "🔄 Auto-update dashboard $(date +'%Y-%m-%d')"
          git push
